<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Academic Publishing Group</title>
    <meta name="title" content="Academic Publishing Group" />
    <meta name="description" content="Academic Publishing Group is a leading open-access publisher of peer-reviewed journals and books across science, technology, and humanities." />
    <meta name="keywords" content="academic publishing, open access, peer reviewed journals, research, science, humanities" />
    <meta name="author" content="Academic Publishing Group" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Academic Publishing Group" />
    <meta property="og:description" content="Leading open-access publisher of peer-reviewed journals." />
    <meta property="og:image" content="./og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Academic Publishing Group" />
    <meta property="twitter:description" content="Leading open-access publisher of peer-reviewed journals." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Critical inline styles to prevent FOUC */
      body { margin: 0; background: #fff; }
      #root { min-height: 100vh; }
      .btn-pill {
        border-radius: 9999px;
        padding: 0.5rem 1.5rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .section-underline {
        position: relative;
        display: inline-block;
      }
      .section-underline::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #002147;
      }
    </style>
  </head>
  <body class="bg-white text-brand-slate font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
